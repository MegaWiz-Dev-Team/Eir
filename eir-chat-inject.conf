## ══════════════════════════════════════════════
## Eir Chat Widget — Apache injection for OpenEMR
## Injects the chat widget script into HTML responses
## Only on pages AFTER login (excludes /login/)
## ══════════════════════════════════════════════

LoadModule substitute_module /usr/lib/apache2/mod_substitute.so

## Only inject on non-login pages
<LocationMatch "^/interface/main/">
    AddOutputFilterByType SUBSTITUTE text/html
    Substitute "s|</body>|<script>window.EIR_GATEWAY_URL='http://localhost:30830';</script><script src=\"http://localhost:30830/eir-chat-widget.js?v=3\" defer></script>\n</body>|ni"
</LocationMatch>
